<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Fichaje — Personal</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Syne+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --lomas:   #f0c040;
    --quilmes: #3dd6c8;
    --laplata: #b094f8;
    --bg: #0a0b0f;
    --card: #13151c;
    --border: #1f2330;
    --text: #eceef5;
    --muted: #5a6180;
    --success: #4ade80;
    --danger: #fb7185;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100svh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    overflow-x: hidden;
  }

  /* animated bg */
  .bg-glow {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    transition: background 0.8s ease;
  }

  /* ── SCREEN: Branch select ── */
  #screen-branch {
    position: relative;
    z-index: 1;
    width: 100%;
    min-height: 100svh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.5rem;
    gap: 1.5rem;
  }

  .brand {
    text-align: center;
    margin-bottom: 0.5rem;
  }

  .brand-icon {
    font-size: 3rem;
    display: block;
    margin-bottom: 0.5rem;
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .brand h1 {
    font-size: 1.6rem;
    font-weight: 800;
    letter-spacing: -0.02em;
  }

  .brand p {
    color: var(--muted);
    font-size: 0.85rem;
    margin-top: 0.3rem;
    font-weight: 400;
  }

  .branch-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 1rem;
    width: 100%;
    max-width: 360px;
  }

  .branch-btn {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 18px;
    padding: 1.4rem 1.6rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 1.1rem;
    transition: all 0.2s;
    text-align: left;
    width: 100%;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    position: relative;
    overflow: hidden;
  }

  .branch-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .branch-btn:active { transform: scale(0.97); }

  .branch-btn.lomas { border-color: rgba(240,192,64,0.3); }
  .branch-btn.lomas::before { background: radial-gradient(circle at left, rgba(240,192,64,0.12), transparent 70%); }
  .branch-btn.lomas:hover, .branch-btn.lomas:focus { border-color: var(--lomas); }
  .branch-btn.lomas:hover::before { opacity: 1; }

  .branch-btn.quilmes { border-color: rgba(61,214,200,0.3); }
  .branch-btn.quilmes::before { background: radial-gradient(circle at left, rgba(61,214,200,0.12), transparent 70%); }
  .branch-btn.quilmes:hover, .branch-btn.quilmes:focus { border-color: var(--quilmes); }
  .branch-btn.quilmes:hover::before { opacity: 1; }

  .branch-btn.laplata { border-color: rgba(176,148,248,0.3); }
  .branch-btn.laplata::before { background: radial-gradient(circle at left, rgba(176,148,248,0.12), transparent 70%); }
  .branch-btn.laplata:hover, .branch-btn.laplata:focus { border-color: var(--laplata); }
  .branch-btn.laplata:hover::before { opacity: 1; }

  .branch-pill {
    width: 44px; height: 44px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.3rem;
    flex-shrink: 0;
  }

  .lomas .branch-pill { background: rgba(240,192,64,0.15); }
  .quilmes .branch-pill { background: rgba(61,214,200,0.15); }
  .laplata .branch-pill { background: rgba(176,148,248,0.15); }

  .branch-btn-text strong {
    display: block;
    font-size: 1rem;
    font-weight: 700;
  }

  .branch-btn-text span {
    font-size: 0.75rem;
    color: var(--muted);
    font-weight: 400;
  }

  .branch-arrow {
    margin-left: auto;
    color: var(--muted);
    font-size: 1.1rem;
    flex-shrink: 0;
  }

  /* ── SCREEN: Person select ── */
  #screen-person {
    display: none;
    position: relative;
    z-index: 1;
    width: 100%;
    min-height: 100svh;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1.5rem 3rem;
    gap: 0;
  }

  #screen-person.active { display: flex; }

  .screen-header {
    width: 100%;
    max-width: 400px;
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 2rem;
  }

  .back-btn {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    width: 38px; height: 38px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--muted);
    font-size: 1.1rem;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .back-btn:hover { color: var(--text); border-color: var(--text); }

  .screen-title {
    font-size: 1.1rem;
    font-weight: 700;
  }

  .branch-tag {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.25rem 0.75rem;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 600;
    margin-left: auto;
  }

  .branch-tag.lomas { background: rgba(240,192,64,0.15); color: var(--lomas); }
  .branch-tag.quilmes { background: rgba(61,214,200,0.15); color: var(--quilmes); }
  .branch-tag.laplata { background: rgba(176,148,248,0.15); color: var(--laplata); }

  .datetime-strip {
    width: 100%;
    max-width: 400px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1rem 1.3rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
  }

  .dt-time {
    font-family: 'Syne Mono', monospace;
    font-size: 1.8rem;
    font-weight: 400;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .dt-date {
    font-size: 0.78rem;
    color: var(--muted);
    text-align: right;
    line-height: 1.5;
  }

  .person-list {
    width: 100%;
    max-width: 400px;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .person-card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 1rem 1.2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .person-card:active { transform: scale(0.98); }

  .person-card.has-entry {
    border-color: rgba(74,222,128,0.3);
  }

  .person-card.fully-done {
    border-color: rgba(90,97,128,0.4);
    opacity: 0.7;
  }

  .person-avatar {
    width: 46px; height: 46px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
    font-size: 1rem;
    flex-shrink: 0;
    color: #0a0b0f;
    position: relative;
  }

  .person-avatar .online-dot {
    position: absolute;
    bottom: 1px; right: 1px;
    width: 11px; height: 11px;
    border-radius: 50%;
    background: var(--success);
    border: 2px solid var(--card);
  }

  .person-info { flex: 1; min-width: 0; }

  .person-name {
    font-size: 1rem;
    font-weight: 700;
  }

  .person-role {
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 0.1rem;
  }

  .person-status {
    text-align: right;
    flex-shrink: 0;
  }

  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    padding: 0.3rem 0.75rem;
    border-radius: 20px;
    font-size: 0.72rem;
    font-weight: 600;
    white-space: nowrap;
  }

  .status-pill.in { background: rgba(74,222,128,0.12); color: var(--success); }
  .status-pill.out { background: rgba(251,113,133,0.12); color: var(--danger); }
  .status-pill.none { background: rgba(90,97,128,0.15); color: var(--muted); }

  .status-time-label {
    font-family: 'Syne Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 0.25rem;
    display: block;
  }

  /* ── SCREEN: Confirm ── */
  #screen-confirm {
    display: none;
    position: relative;
    z-index: 1;
    width: 100%;
    min-height: 100svh;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.5rem;
    gap: 1.5rem;
  }

  #screen-confirm.active { display: flex; }

  .confirm-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 2rem 1.8rem;
    width: 100%;
    max-width: 380px;
    text-align: center;
  }

  .confirm-avatar {
    width: 72px; height: 72px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.6rem;
    font-weight: 700;
    margin: 0 auto 1.2rem;
    color: #0a0b0f;
  }

  .confirm-name {
    font-size: 1.5rem;
    font-weight: 800;
    margin-bottom: 0.3rem;
  }

  .confirm-meta {
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 1.8rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
  }

  .action-type {
    font-size: 0.85rem;
    font-weight: 700;
    padding: 0.5rem 1.2rem;
    border-radius: 20px;
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    margin-bottom: 1.8rem;
  }

  .action-type.ingreso { background: rgba(74,222,128,0.15); color: var(--success); }
  .action-type.egreso  { background: rgba(251,113,133,0.15); color: var(--danger); }

  .confirm-time {
    font-family: 'Syne Mono', monospace;
    font-size: 2.8rem;
    font-weight: 400;
    line-height: 1;
    margin-bottom: 0.3rem;
    letter-spacing: -0.03em;
  }

  .confirm-date-str {
    font-size: 0.78rem;
    color: var(--muted);
    margin-bottom: 2rem;
  }

  .btn-confirm {
    width: 100%;
    border: none;
    border-radius: 14px;
    padding: 1rem;
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 0.75rem;
  }

  .btn-confirm.ingreso { background: var(--success); color: #0a0b0f; }
  .btn-confirm.egreso  { background: var(--danger);  color: #0a0b0f; }
  .btn-confirm:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-confirm:active { transform: scale(0.98); }

  .btn-cancel {
    width: 100%;
    background: none;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 0.9rem;
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-cancel:hover { color: var(--text); border-color: var(--text); }

  /* ── SCREEN: Success ── */
  #screen-success {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 50;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    background: var(--bg);
    text-align: center;
    gap: 1rem;
  }

  #screen-success.active { display: flex; }

  .success-icon {
    font-size: 5rem;
    animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }

  @keyframes popIn {
    from { transform: scale(0); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }

  .success-title {
    font-size: 2rem;
    font-weight: 800;
    margin-top: 0.5rem;
  }

  .success-sub {
    color: var(--muted);
    font-size: 0.9rem;
    line-height: 1.6;
  }

  .success-time {
    font-family: 'Syne Mono', monospace;
    font-size: 2.5rem;
    letter-spacing: -0.03em;
  }

  .countdown-bar {
    width: 200px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 1.5rem;
    overflow: hidden;
  }

  .countdown-fill {
    height: 100%;
    border-radius: 2px;
    animation: drain 3s linear forwards;
  }

  @keyframes drain {
    from { width: 100%; }
    to   { width: 0%; }
  }

  /* section divider */
  .list-section-label {
    width: 100%;
    max-width: 400px;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    font-weight: 600;
    margin-bottom: 0.3rem;
    margin-top: 0.5rem;
    padding: 0 0.2rem;
  }
</style>
</head>
<body>

<div class="bg-glow" id="bgGlow"></div>

<!-- ══ SCREEN 1: Sucursal ══ -->
<div id="screen-branch">
  <div class="brand">
    <span class="brand-icon">⏱</span>
    <h1>Fichaje de Personal</h1>
    <p>Seleccioná tu sucursal para continuar</p>
  </div>

  <div class="branch-grid">
    <button class="branch-btn lomas" onclick="selectBranch('lomas')">
      <div class="branch-pill">🏙</div>
      <div class="branch-btn-text">
        <strong>Lomas de Zamora</strong>
        <span>Abel · Alan · Marcos</span>
      </div>
      <span class="branch-arrow">›</span>
    </button>

    <button class="branch-btn quilmes" onclick="selectBranch('quilmes')">
      <div class="branch-pill">🌊</div>
      <div class="branch-btn-text">
        <strong>Quilmes</strong>
        <span>Tomás · Fran</span>
      </div>
      <span class="branch-arrow">›</span>
    </button>

    <button class="branch-btn laplata" onclick="selectBranch('laplata')">
      <div class="branch-pill">🏛</div>
      <div class="branch-btn-text">
        <strong>La Plata</strong>
        <span>Marina · Milagros · Julián</span>
      </div>
      <span class="branch-arrow">›</span>
    </button>
  </div>
</div>

<!-- ══ SCREEN 2: Persona ══ -->
<div id="screen-person">
  <div class="screen-header">
    <button class="back-btn" onclick="goBack('branch')">‹</button>
    <div class="screen-title">¿Quién sos?</div>
    <div class="branch-tag" id="branchTag"></div>
  </div>

  <div class="datetime-strip">
    <div class="dt-time" id="liveTime">--:--</div>
    <div class="dt-date" id="liveDate">--</div>
  </div>

  <div class="person-list" id="personList"></div>
</div>

<!-- ══ SCREEN 3: Confirmar ══ -->
<div id="screen-confirm">
  <div class="screen-header" style="max-width:380px">
    <button class="back-btn" onclick="goBack('person')">‹</button>
    <div class="screen-title">Confirmá tu fichaje</div>
  </div>

  <div class="confirm-card">
    <div class="confirm-avatar" id="cAvatar"></div>
    <div class="confirm-name" id="cName"></div>
    <div class="confirm-meta" id="cMeta"></div>
    <div class="action-type" id="cActionType"></div>
    <div class="confirm-time" id="cTime"></div>
    <div class="confirm-date-str" id="cDate"></div>
    <button class="btn-confirm" id="cBtn" onclick="confirmRecord()"></button>
    <button class="btn-cancel" onclick="goBack('person')">Cancelar</button>
  </div>
</div>

<!-- ══ SCREEN 4: Éxito ══ -->
<div id="screen-success">
  <div class="success-icon" id="sIcon"></div>
  <div class="success-time" id="sTime"></div>
  <div class="success-title" id="sTitle"></div>
  <div class="success-sub" id="sSub"></div>
  <div class="countdown-bar"><div class="countdown-fill" id="sFill"></div></div>
</div>

<script>
// ── Data ──────────────────────────────────────────
const STAFF = {
  lomas:   [
    { name:'Abel',     role:'Encargado', initials:'AB' },
    { name:'Alan',     role:'Ventas',    initials:'AL' },
    { name:'Marcos',   role:'Ventas',    initials:'MA' },
  ],
  quilmes: [
    { name:'Tomás',    role:'Encargado', initials:'TO' },
    { name:'Fran',     role:'Ventas',    initials:'FR' },
  ],
  laplata: [
    { name:'Marina',   role:'Encargada', initials:'MR' },
    { name:'Milagros', role:'Ventas',    initials:'MI' },
    { name:'Julián',   role:'Ventas',    initials:'JU' },
  ],
};

const BRANCH_NAMES = { lomas:'Lomas de Zamora', quilmes:'Quilmes', laplata:'La Plata' };
const BRANCH_COLORS = { lomas:'#f0c040', quilmes:'#3dd6c8', laplata:'#b094f8' };
const BRANCH_EMOJIS = { lomas:'🏙', quilmes:'🌊', laplata:'🏛' };

let currentBranch = null;
let currentPerson = null;
let pendingAction = null; // 'ingreso' | 'egreso'
let clockInterval = null;

// ── Storage helpers ───────────────────────────────
function getRecords() {
  return JSON.parse(localStorage.getItem('personalRecords') || '[]');
}

function saveRecords(recs) {
  localStorage.setItem('personalRecords', JSON.stringify(recs));
}

function todayStr() {
  return new Date().toISOString().slice(0,10);
}

function nowTimeStr() {
  return new Date().toTimeString().slice(0,5);
}

function getPersonTodayRecords(name) {
  return getRecords().filter(r => r.person === name && r.date === todayStr());
}

// ── Clock ─────────────────────────────────────────
function startClock() {
  function tick() {
    const now = new Date();
    document.getElementById('liveTime').textContent =
      now.toTimeString().slice(0,5);
    document.getElementById('liveDate').textContent =
      now.toLocaleDateString('es-AR', { weekday:'long', day:'numeric', month:'long' });
  }
  tick();
  clearInterval(clockInterval);
  clockInterval = setInterval(tick, 1000);
}

// ── Navigation ────────────────────────────────────
function show(id) {
  ['screen-branch','screen-person','screen-confirm','screen-success'].forEach(s => {
    const el = document.getElementById(s);
    if (s === 'screen-branch') { el.style.display = s === id ? 'flex' : 'none'; }
    else { el.classList.toggle('active', s === id); }
  });
}

function goBack(to) {
  if (to === 'branch') {
    show('screen-branch');
    setGlow(null);
  } else if (to === 'person') {
    show('screen-person');
    renderPersonList();
  }
}

// ── Glow background ───────────────────────────────
function setGlow(branch) {
  const el = document.getElementById('bgGlow');
  if (!branch) {
    el.style.background = '';
    return;
  }
  const c = BRANCH_COLORS[branch];
  el.style.background =
    `radial-gradient(ellipse 60% 50% at 50% 0%, ${c}18 0%, transparent 70%),
     radial-gradient(ellipse 40% 30% at 80% 90%, ${c}0d 0%, transparent 60%)`;
}

// ── Branch select ─────────────────────────────────
function selectBranch(branch) {
  currentBranch = branch;
  setGlow(branch);

  // tag
  const tag = document.getElementById('branchTag');
  tag.className = `branch-tag ${branch}`;
  tag.textContent = `${BRANCH_EMOJIS[branch]} ${BRANCH_NAMES[branch]}`;

  renderPersonList();
  show('screen-person');
  startClock();
}

// ── Person list ───────────────────────────────────
function renderPersonList() {
  const list = document.getElementById('personList');
  const people = STAFF[currentBranch];
  const color = BRANCH_COLORS[currentBranch];

  // Group: encargado, ventas
  const encargados = people.filter(p => p.role !== 'Ventas');
  const ventas = people.filter(p => p.role === 'Ventas');

  list.innerHTML = '';

  function renderGroup(label, group) {
    if (!group.length) return;
    const lbl = document.createElement('div');
    lbl.className = 'list-section-label';
    lbl.textContent = label;
    list.appendChild(lbl);

    group.forEach(person => {
      const recs = getPersonTodayRecords(person.name);
      const lastRec = recs[recs.length - 1];
      const isIn = lastRec && lastRec.type === 'ingreso';
      const isOut = lastRec && lastRec.type === 'egreso';
      // fully done = has both ingreso and egreso
      const hasIngreso = recs.some(r => r.type === 'ingreso');
      const hasEgreso  = recs.some(r => r.type === 'egreso');

      let statusHTML = '';
      let cardClass = 'person-card';

      if (hasIngreso && hasEgreso) {
        cardClass += ' fully-done';
        statusHTML = `<div class="status-pill out">✓ Completo</div>
                      <span class="status-time-label">${recs.find(r=>r.type==='ingreso').time} — ${recs.find(r=>r.type==='egreso').time}</span>`;
      } else if (hasIngreso) {
        cardClass += ' has-entry';
        statusHTML = `<div class="status-pill in">● Adentro</div>
                      <span class="status-time-label">desde ${recs.find(r=>r.type==='ingreso').time}</span>`;
      } else {
        statusHTML = `<div class="status-pill none">— Sin fichar</div>`;
      }

      const card = document.createElement('div');
      card.className = cardClass;
      card.onclick = () => selectPerson(person);
      card.innerHTML = `
        <div class="person-avatar" style="background:${color}">
          ${person.initials}
          ${hasIngreso && !hasEgreso ? '<div class="online-dot"></div>' : ''}
        </div>
        <div class="person-info">
          <div class="person-name">${person.name}</div>
          <div class="person-role">${person.role}</div>
        </div>
        <div class="person-status">${statusHTML}</div>
      `;
      list.appendChild(card);
    });
  }

  renderGroup('Encargado/a', encargados);
  renderGroup('Ventas', ventas);
}

// ── Person select ─────────────────────────────────
function selectPerson(person) {
  currentPerson = person;
  const recs = getPersonTodayRecords(person.name);
  const hasIngreso = recs.some(r => r.type === 'ingreso');
  const hasEgreso  = recs.some(r => r.type === 'egreso');

  if (hasIngreso && hasEgreso) {
    alert(`${person.name} ya tiene ingreso y egreso registrados hoy.`);
    return;
  }

  pendingAction = hasIngreso ? 'egreso' : 'ingreso';

  const color = BRANCH_COLORS[currentBranch];
  const now = new Date();
  const timeStr = now.toTimeString().slice(0,5);
  const dateStr = now.toLocaleDateString('es-AR', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

  // fill confirm screen
  const avatar = document.getElementById('cAvatar');
  avatar.textContent = person.initials;
  avatar.style.background = color;

  document.getElementById('cName').textContent = person.name;
  document.getElementById('cMeta').innerHTML =
    `<span>${person.role}</span> <span style="color:var(--border)">·</span> <span>${BRANCH_NAMES[currentBranch]}</span>`;
  document.getElementById('cTime').textContent = timeStr;
  document.getElementById('cDate').textContent = dateStr;

  const actionEl = document.getElementById('cActionType');
  const btnEl    = document.getElementById('cBtn');

  if (pendingAction === 'ingreso') {
    actionEl.className = 'action-type ingreso';
    actionEl.innerHTML = '▶ Registrar INGRESO';
    btnEl.className = 'btn-confirm ingreso';
    btnEl.textContent = '✓ Confirmar Ingreso';
  } else {
    actionEl.className = 'action-type egreso';
    actionEl.innerHTML = '◼ Registrar EGRESO';
    btnEl.className = 'btn-confirm egreso';
    btnEl.textContent = '✓ Confirmar Egreso';
  }

  show('screen-confirm');
}

// ── Confirm & save ────────────────────────────────
function confirmRecord() {
  const now = new Date();
  const rec = {
    id: Date.now(),
    branch: currentBranch,
    person: currentPerson.name,
    role: currentPerson.role,
    date: todayStr(),
    time: now.toTimeString().slice(0,5),
    type: pendingAction,
    note: ''
  };

  const recs = getRecords();
  recs.push(rec);
  saveRecords(recs);

  showSuccess(rec);
}

// ── Success screen ────────────────────────────────
function showSuccess(rec) {
  const isIngreso = rec.type === 'ingreso';
  document.getElementById('sIcon').textContent = isIngreso ? '✅' : '👋';
  document.getElementById('sTime').textContent = rec.time;
  document.getElementById('sTitle').textContent =
    isIngreso ? `¡Buen día, ${rec.person}!` : `¡Hasta mañana, ${rec.person}!`;
  document.getElementById('sSub').innerHTML =
    `${isIngreso ? 'Ingreso' : 'Egreso'} registrado correctamente<br>${BRANCH_NAMES[rec.branch]}`;

  const fill = document.getElementById('sFill');
  fill.style.background = BRANCH_COLORS[currentBranch];
  // restart animation
  fill.style.animation = 'none';
  fill.offsetHeight; // reflow
  fill.style.animation = 'drain 3s linear forwards';

  show('screen-success');

  setTimeout(() => {
    show('screen-branch');
    setGlow(null);
    currentBranch = null;
    currentPerson = null;
    pendingAction = null;
  }, 3200);
}

// ── Boot ──────────────────────────────────────────
show('screen-branch');

// Check URL param: ?sucursal=lomas
const params = new URLSearchParams(location.search);
const branchParam = params.get('sucursal');
if (branchParam && STAFF[branchParam]) {
  selectBranch(branchParam);
}
</script>
